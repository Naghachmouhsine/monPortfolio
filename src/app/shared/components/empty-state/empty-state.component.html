<div class="state-panel" [class.state-panel--error]="variant === 'error'">
  <div class="state-panel__icon" aria-hidden="true">
    @if (variant === 'error') {
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v5M12 16h.01"/>
      </svg>
    } @else {
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 7h16M4 12h10M4 17h7"/>
      </svg>
    }
  </div>
  <h3 class="state-panel__title">{{ title }}</h3>
  <p class="state-panel__message">{{ message }}</p>
  @if (actionLabel) {
    <button type="button" class="btn btn-primary" (click)="action.emit()">
      {{ actionLabel }}
    </button>
  }
</div>
